<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA Test App</title>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="app">
        <!-- App container - content will be dynamically loaded here -->
        <div id="loading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Cargando...</p>
        </div>
        
        <!-- Main content container -->
        <div id="content" class="content-container"></div>
        
        <!-- Toast notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- JavaScript modules -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/screens/login.js"></script>
    <script src="js/screens/register.js"></script>
    <script src="js/screens/reset-password.js"></script>
    <script src="js/screens/devices.js"></script>
    <script src="js/screens/device-detail.js"></script>
    <script src="js/screens/device-edit.js"></script>
    <script src="js/screens/device-parameters.js"></script>
    <script src="js/screens/device-info.js"></script>
    <script src="js/screens/device-users.js"></script>
    <script src="js/screens/device-control-panel.js"></script>
    <script src="js/screens/groups.js"></script>
    <script src="js/screens/events.js"></script>
    <script src="js/screens/settings.js"></script>
    <script src="js/screens/notifications.js"></script>
    <script src="js/screens/support.js"></script>
    <script src="js/screens/technical-contact.js"></script>
    <script src="js/screens/add-device.js"></script>
    <script src="js/screens/user-roles.js"></script>
    <script src="js/screens/link-virtual-user.js"></script>
    
    <!-- Initialize app -->
    <script>
        // Initialize the app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
